<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Paso 2: Guarda o comparte tu resultado</title>
  <desc id="desc">Mockup del bloque para enviar el reporte por correo y compartir el resumen.</desc>
  <rect width="1200" height="720" fill="#08111f"/>
  <rect x="40" y="40" width="1120" height="640" rx="36" fill="#0d1728" stroke="#22344b"/>
  <text x="78" y="96" fill="#d8e2f0" font-size="15" font-family="Arial, Helvetica, sans-serif" letter-spacing="3">PASO 2 · GUARDA TU LECTURA</text>
  <text x="78" y="146" fill="#ffffff" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">No te quedes con una captura suelta</text>
  <text x="78" y="186" fill="#9fb0c9" font-size="22" font-family="Arial, Helvetica, sans-serif">Envíate el resultado por correo o compártelo con un socio para revisarlo luego.</text>

  <rect x="78" y="238" width="1044" height="148" rx="26" fill="#09111e" stroke="#22344b"/>
  <text x="114" y="286" fill="#ffffff" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Envíame este reporte a mi correo</text>
  <text x="114" y="320" fill="#9fb0c9" font-size="18" font-family="Arial, Helvetica, sans-serif">Déjanos tu email y te lo enviamos para que lo revises con calma.</text>
  <rect x="114" y="340" width="392" height="54" rx="18" fill="#0f1728" stroke="#2a3f5a"/>
  <text x="138" y="374" fill="#7f8da4" font-size="18" font-family="Arial, Helvetica, sans-serif">tu@correo.com</text>
  <rect x="528" y="340" width="320" height="54" rx="18" fill="#10253d" stroke="#1c5a50"/>
  <text x="688" y="374" fill="#38f2a1" font-size="20" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="700">Enviar resultado</text>

  <rect x="78" y="430" width="510" height="188" rx="26" fill="#09111e" stroke="#22344b"/>
  <text x="114" y="476" fill="#d8e2f0" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="700">Qué te sirve guardar</text>
  <text x="114" y="518" fill="#9fb0c9" font-size="18" font-family="Arial, Helvetica, sans-serif">• Comparar escenarios antes y después</text>
  <text x="114" y="554" fill="#9fb0c9" font-size="18" font-family="Arial, Helvetica, sans-serif">• Mandárselo a tu equipo o socio</text>
  <text x="114" y="590" fill="#9fb0c9" font-size="18" font-family="Arial, Helvetica, sans-serif">• Tomar decisiones sin improvisar</text>

  <rect x="612" y="430" width="510" height="188" rx="26" fill="#09111e" stroke="#22344b"/>
  <text x="648" y="476" fill="#d8e2f0" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="700">Otros atajos útiles</text>
  <rect x="648" y="506" width="190" height="50" rx="18" fill="#0f1728" stroke="#2a3f5a"/>
  <text x="743" y="538" fill="#ffffff" font-size="18" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">Copiar resumen</text>
  <rect x="860" y="506" width="222" height="50" rx="18" fill="#38f2a1"/>
  <text x="971" y="538" fill="#08111f" font-size="18" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="700">Compartir WhatsApp</text>
  <text x="648" y="590" fill="#9fb0c9" font-size="18" font-family="Arial, Helvetica, sans-serif">Usa estos dos botones para guardar contexto rápido sin rehacer el cálculo.</text>
</svg>
